name: Delete Workflow Runs

on:
  workflow_dispatch:
    inputs:
      keep_minimum:
        description: "Minimum runs to keep per workflow (0 = delete all)"
        required: false
        default: "16"

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const keepMinimum = parseInt('${{ github.event.inputs.keep_minimum }}') || 0;

            const { data: { workflows } } = await github.rest.actions.listRepoWorkflows({
              owner,
              repo,
              per_page: 100,
            });

            let totalDeleted = 0;

            for (const workflow of workflows) {
              console.log(`\nProcessing workflow: ${workflow.name} (ID: ${workflow.id})`);

              let page = 1;
              let allRuns = [];

              while (true) {
                const { data: { workflow_runs: runs } } = await github.rest.actions.listWorkflowRuns({
                  owner,
                  repo,
                  workflow_id: workflow.id,
                  per_page: 100,
                  page,
                });

                if (runs.length === 0) break;
                allRuns.push(...runs);
                page++;
              }

              // Exclude the current run
              const runsToConsider = allRuns.filter(run => run.id !== context.runId);

              // Sort newest first, then skip keepMinimum
              runsToConsider.sort((a, b) => new Date(b.created_at).getTime() - new Date(a.created_at).getTime());
              const deletable = runsToConsider.slice(keepMinimum);

              console.log(`  Found ${allRuns.length} runs, deleting ${deletable.length} (keeping ${runsToConsider.length - deletable.length + 1})`);

              for (const run of deletable) {
                try {
                  await github.rest.actions.deleteWorkflowRun({
                    owner,
                    repo,
                    run_id: run.id,
                  });
                  totalDeleted++;
                  console.log(`  ✓ Deleted run #${run.run_number} (${run.id}) — ${run.display_title}`);
                } catch (error) {
                  console.log(`  ✗ Failed to delete run ${run.id}: ${error.message}`);
                }
              }
            }

            console.log(`\nDone. Deleted ${totalDeleted} workflow run(s).`);
